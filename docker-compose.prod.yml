version: '3.8'

services:
  # NestJS Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      # Persist uploaded images and files
      - uploads_data:/app/uploads
      # Persist logs
      - logs_data:/app/logs
      # Persist database (if using SQLite)
      - database_data:/app/prisma
    networks:
      - backend-network
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node dist/src/main.js
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
    driver: local
  logs_data:
    driver: local
  database_data:
    driver: local

networks:
  backend-network:
    driver: bridge

