version: '3.8'
services:
  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: redis-app
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - backend-network

  # NestJS Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      # Persist uploads folder on the host machine
      - ./uploads:/app/uploads
    networks:
      - backend-network
    depends_on:
      - redis
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node dist/src/main.js
      "

volumes:
  redis_data:

networks:
  backend-network:
    driver: bridge