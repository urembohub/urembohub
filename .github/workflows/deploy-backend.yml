name: Deploy Backend to Staging

on:
  push:
    branches:
      - benard
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/urembo-backend:latest

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_BASE64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} << ENDSSH
          cd ~/apps/backend
          
          # Create necessary directories
          mkdir -p uploads logs prisma
          chmod 755 uploads logs prisma
          
          # Pull the latest image from Docker Hub
          docker pull ${DOCKER_USERNAME}/urembo-backend:latest
          
          # Stop and remove old container
          docker stop backend-app || true
          docker rm backend-app || true
          
          # Run with volume mounts to persist data
          docker run -d \
            --name backend-app \
            --restart unless-stopped \
            -p 3001:3000 \
            -v $(pwd)/uploads:/app/uploads \
            -v $(pwd)/logs:/app/logs \
            -v $(pwd)/prisma:/app/prisma \
            --env-file .env \
            ${DOCKER_USERNAME}/urembo-backend:latest
          
          echo "✅ Backend deployment complete!"
          docker ps | grep backend-app
          ENDSSH
      
      - name: Verify Deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 15
          curl -f http://${{ secrets.SERVER_HOST }}:3001/health || echo "Health check endpoint not available"
          echo "✅ Backend deployment verified!"