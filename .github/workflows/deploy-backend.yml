name: Deploy Backend

on:
  push:
    branches:
      - main
      - benard
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/urembo-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/urembo-backend:${{ github.sha }}

      - name: Deploy to Server
        if: github.ref == 'refs/heads/benard' && github.event_name == 'push'
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Navigate to backend directory
            cd /home/ubuntu/backend || mkdir -p /home/ubuntu/backend && cd /home/ubuntu/backend
            
            # Create necessary directories
            mkdir -p uploads logs prisma
            
            # Set proper permissions
            chmod 755 uploads logs prisma
            
            # Stop existing container (preserve volumes)
            docker stop backend-app || true
            docker rm backend-app || true
            
            # Pull latest image
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/urembo-backend:latest
            
            # Run with volume mounts to persist data
            docker run -d \
              --name backend-app \
              --restart unless-stopped \
              -p 3001:3000 \
              -v /home/ubuntu/backend/uploads:/app/uploads \
              -v /home/ubuntu/backend/logs:/app/logs \
              -v /home/ubuntu/backend/prisma:/app/prisma \
              --env-file /home/ubuntu/backend/.env \
              ${{ secrets.DOCKER_HUB_USERNAME }}/urembo-backend:latest
            
            # Wait for service to be ready
            sleep 10
            
            # Check if service is running
            if docker ps | grep -q "backend-app"; then
              echo "✅ Backend deployed successfully!"
            else
              echo "❌ Deployment failed!"
              docker logs backend-app
              exit 1
            fi